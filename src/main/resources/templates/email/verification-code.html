<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이메일 인증</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: "Pretendard", "Apple SD Gothic Neo", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 540px;
            background: #232323;
            border: 1px solid #333;
            border-radius: 18px;
            padding: 38px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #f5f5f5;
        }

        .description {
            font-size: 16px;
            line-height: 1.8;
            color: #b5b5b5;
            margin-bottom: 34px;
        }

        .code-box {
            border: 1px solid #3a3a3a;
            border-radius: 16px;
            background: #262626;
            padding: 28px 24px;
            text-align: center;
            margin-bottom: 28px;
        }

        .code-label {
            font-size: 14px;
            color: #8e8e8e;
            margin-bottom: 18px;
        }

        .code-wrapper {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .code-digit {
            width: 52px;
            height: 52px;
            border: 1px solid #5a5a5a;
            border-radius: 10px;
            background: #2f2f2f;
            color: #ffffff;
            font-size: 28px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .expire-text {
            font-size: 14px;
            color: #9a9a9a;
        }

        .warning-box {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            background: rgba(255, 187, 0, 0.12);
            border: 1px solid rgba(255, 187, 0, 0.35);
            color: #f0c14b;
            padding: 18px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 34px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 28px 22px;
            }

            .title {
                font-size: 26px;
            }

            .code-digit {
                width: 46px;
                height: 46px;
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h1 class="title">이메일 주소를 인증해주세요</h1>

    <p class="description">
        안녕하세요.
        <span th:text="${serviceName}">MyService</span>
        회원가입을 위해 이메일 인증이 필요합니다.<br>
        아래의 6자리 인증 코드를 인증 화면에 입력해주세요.
    </p>

    <div class="code-box">

        <div class="code-label">인증 코드</div>

        <div class="code-wrapper">
            <div class="code-digit"
                 th:each="digit : ${digits}"
                 th:text="${digit}">
                1
            </div>
        </div>

        <div class="expire-text">
            이 코드는
            <span th:text="${expireMinutes}">3</span>
            분 후 만료됩니다.
        </div>

    </div>

    <div class="warning-box">
        <div>!</div>
        <div>
            이 이메일을 요청하지 않으셨다면 이 메일을 무시하셔도 됩니다.
            인증 코드를 타인과 공유하지 마세요.
        </div>
    </div>
</div>

</body>
</html>
